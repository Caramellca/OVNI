
<!DOCTYPE html>
<html lang="ru"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>В поисках ИНЛО</title>

  <style>
    :root{
      color-scheme:dark;
      --bg:#0d1526;
      --panel:#172338;
      --line:#2d3e5a;
      --accent:#7db6ff;
      --txt:#eef5ff;
      --muted:#a7b4c8;
      --edit:#ffcc66;
      --danger:#d94848;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--txt);font:16px system-ui,-apple-system,"Segoe UI",Arial,sans-serif;}
    header{position:sticky;top:0;z-index:1000;isolation:isolate;padding:16px max(18px,calc((100% - 1220px)/2));background:#0d1526f7;backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
    h1{margin:0 0 11px;font-size:22px;}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
    button{padding:8px 12px;color:var(--txt);background:#1b3355;border:1px solid var(--line);border-radius:10px;cursor:pointer;font:inherit;}
    main{position:relative;z-index:1;max-width:1220px;margin:auto;padding:22px 18px 48px;}
    section{margin-bottom:28px;scroll-margin-top:108px;}
    h2{display:flex;align-items:center;gap:10px;margin:0 0 12px;font-size:20px;}
    em{color:var(--muted);font-size:13px;font-style:normal;font-weight:500;}
    section.section-hidden-user{display:none;}
    body.editing-mode section.section-hidden-user{display:block;opacity:0.55;}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:10px;}
    .grid.inactive{margin-top:8px;}
    .spacer-block{grid-column:1/-1;height:20px;position:relative;}
    .spacer-block-inner{width:100%;height:100%;border-radius:6px;background:transparent;transition:background .15s;}
    body.editing-mode .spacer-block-inner{background:rgba(125,182,255,.08);border:1px dashed var(--line);cursor:grab;display:flex;align-items:center;justify-content:center;}
    .spacer-controls{position:absolute;top:-9px;right:2px;z-index:5;display:none;gap:4px;align-items:center;}
    body.editing-mode .spacer-controls{display:flex;}

    .grid.inactive:empty:not(.is-collapsed){display:flex;align-items:center;justify-content:center;min-height:78px;padding:10px;border:1px dashed var(--line);border-radius:11px;color:var(--muted);font-size:13px;transition:border-color .15s ease,color .15s ease,background .15s ease;}
    .grid.inactive:empty:not(.is-collapsed)::before{content:"Перетащите карточку сюда";pointer-events:none;}
    .grid.inactive:empty:not(.is-collapsed).dragover{border-color:var(--edit);background:rgba(255,204,102,.06);color:var(--edit);box-shadow:0 0 0 2px rgba(255,204,102,.18) inset;}
    .grid.inactive.is-collapsed{display:none;}

    .subhead.admin-only{display:none;}
    body.editing-mode .subhead.admin-only{display:flex;}

    .card,.add-card{position:relative;display:grid;grid-template-columns:56px 1fr;grid-template-rows:1fr auto;gap:0 9px;align-items:center;min-height:65px;padding:9px;color:var(--txt);background:var(--panel);border:1px solid var(--line);border-radius:11px;text-decoration:none;transition:.15s;user-select:none;}
    .card:hover,.add-card:hover{transform:translateY(-2px);background:#1c304e;border-color:var(--accent);}
    .card.editing{outline:none;}
    .card.drag-source{opacity:.4;}
    .card.drag-over-before{box-shadow:-3px 0 0 0 var(--edit),inset 3px 0 0 0 var(--edit);}
    .card.drag-over-after{box-shadow:3px 0 0 0 var(--edit),inset -3px 0 0 0 var(--edit);}
    .card.dragover,.grid.dragover{border-color:var(--edit);box-shadow:0 0 0 2px rgba(255,204,102,.25) inset;}
    .card img,.noicon{grid-row:1/3;width:56px;height:56px;object-fit:contain;}
    .noicon{display:grid;place-items:center;color:var(--accent);font-size:24px;}
    .name{font-weight:650;line-height:1.16;}
    small{padding-top:3px;color:var(--muted);font-size:11px;}
    .inactive-card{opacity:.45;}

    /* ── minimal icon buttons (shared style, like "Неактивные" label) ── */
    .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;padding:0;background:transparent;border:0;border-radius:6px;color:var(--muted);cursor:pointer;transition:color .18s ease,background .18s ease;}
    .icon-btn:hover{color:var(--accent);background:rgba(125,182,255,.1);}
    .icon-btn svg{width:16px;height:16px;stroke-width:1.6;}
    .icon-btn.danger:hover{color:var(--danger);background:rgba(217,72,72,.1);}
    .icon-btn.active-eye{color:var(--accent);}

    .delete-x{position:absolute;top:-9px;right:-9px;z-index:5;display:none;background:var(--bg);border-radius:50%;}
    .editing-mode .delete-x{display:flex;}
    .editing-mode .card{cursor:grab;}
    .editing-mode .card:active{cursor:grabbing;}
    .add-card{align-items:center;justify-items:center;opacity:.55;cursor:pointer;}
    .add-card .plus{color:#dfe8ff;font-size:28px;font-weight:700;line-height:1;}
    .add-card.single{grid-template-columns:1fr;grid-template-rows:1fr;min-height:65px;}
    .add-card.single .plus{grid-row:1/3;}
    .add-spacer-btn{opacity:.55;cursor:pointer;align-items:center;justify-content:center;min-height:40px;}
    .add-spacer-btn svg{width:20px;height:20px;stroke-width:1.5;color:var(--muted);}

    .subhead.toggleable{display:flex;align-items:center;justify-content:space-between;width:100%;min-height:42px;margin-top:16px;padding:0 2px 9px;background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;cursor:pointer;user-select:none;}
    .subhead .subtitle{color:var(--muted);font-size:14px;font-weight:400;transition:color .18s ease;}
    .subhead .arrow{display:inline-block;color:var(--accent);font-size:15px;line-height:1;transform:rotate(0deg);transition:transform .26s cubic-bezier(.2,.8,.2,1),color .18s ease;will-change:transform;}
    .subhead.toggleable:hover .subtitle{color:var(--accent);}
    .subhead.toggleable.is-collapsed .arrow{transform:rotate(-90deg);}

    .section-title-text{cursor:default;}
    body.editing-mode .section-title-text{cursor:text;border-bottom:1px dashed var(--line);padding-bottom:1px;}
    body.editing-mode .section-title-text:focus{outline:none;border-bottom-color:var(--accent);}
    .section-controls{display:none;gap:4px;align-items:center;margin-left:6px;}
    body.editing-mode .section-controls{display:flex;}
    .section-type-select{display:none;margin-left:6px;padding:3px 6px;font-size:11px;color:var(--muted);background:#0e1727;border:1px solid var(--line);border-radius:7px;}
    body.editing-mode .section-type-select{display:inline-block;}

    .modal-backdrop{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(6,10,18,.72);}
    .modal{width:min(560px,100%);padding:16px;background:#111b2d;border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 80px rgba(0,0,0,.45);position:relative;}
    .modal h3{margin:0 0 12px;font-size:18px;padding-right:50px;}
    .form-row{display:grid;gap:6px;margin-bottom:12px;}
    .form-row select{width:100%;padding:10px 12px;color:var(--txt);background:#0e1727;border:1px solid var(--line);border-radius:10px;font:inherit;cursor:pointer;}
    .form-row select:focus{outline:none;border-color:var(--accent);}
    label{color:var(--muted);font-size:13px;}
    input{width:100%;padding:10px 12px;color:var(--txt);background:#0e1727;border:1px solid var(--line);border-radius:10px;font:inherit;}
    input:disabled{color:var(--muted);background:#0b1321;border-color:#233149;opacity:.62;cursor:default;}
    .split-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .input-with-icon{display:flex;gap:6px;align-items:center;}
    .input-with-icon input{flex:1;}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
    .helper{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.4;}
    .undo-redo{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-left:auto;}
    #undoBtn,#redoBtn{width:40px;height:40px;padding:0;font-size:22px;line-height:1;}
    #modeBtn.save-mode{color:#111;background:var(--edit);border-color:var(--edit);}
    #loginBtn.logged-in{background:#1f5c34;border-color:#2c7a45;}
    #syncStatus{font-size:12px;color:var(--muted);margin-left:6px;}

    /* toggle switch - blue, top-right of modal, no label */
    .modal-toggle-corner{position:absolute;top:16px;right:16px;}
    .toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:#2d3e5a;border-radius:24px;cursor:pointer;transition:.2s;}
    .toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.2s;}
    .toggle input:checked + .toggle-slider{background:#2c5a8a;}
    .toggle input:checked + .toggle-slider:before{transform:translateX(18px);background:var(--accent);}

    #addSectionBtn{display:none;margin-top:8px;}
    body.editing-mode #addSectionBtn{display:inline-flex;}

    @media(max-width:620px){.toolbar{align-items:stretch;}.undo-redo{width:100%;margin-left:0;}}
    @media(max-width:460px){.grid{grid-template-columns:1fr;}.split-row{grid-template-columns:1fr;}}
  </style>
</head>

<body class="">
  <header>
    <h1>В поисках ИНЛО</h1>
    <div class="toolbar">
      <button id="loginBtn" type="button">Войти</button>
      <button id="modeBtn" type="button" style="display:none;">Редактировать</button>
      <button id="undoBtn" type="button" title="Отменить" style="display:none;">↶</button>
      <button id="redoBtn" type="button" title="Повторить" style="display:none;">↷</button>
      <span id="syncStatus">Подключение...</span>
    </div>
  </header>

  <main id="main"></main>
  <button id="addSectionBtn" type="button">+ Добавить категорию</button>

  <div class="modal-backdrop" id="loginModal">
    <div class="modal">
      <h3>Вход администратора</h3>
      <div class="form-row"><label>Email</label><input id="loginEmail" type="email" autocomplete="username"></div>
      <div class="form-row"><label>Пароль</label><input id="loginPassword" type="password" autocomplete="current-password"></div>
      <div class="modal-actions">
        <button id="loginCancel" type="button">Отмена</button>
        <button id="loginSubmit" type="button">Войти</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <label class="toggle modal-toggle-corner">
        <input type="checkbox" id="editEnabled" checked>
        <span class="toggle-slider"></span>
      </label>
      <h3 id="modalTitle">Новая карточка</h3>
      <div class="form-row"><label>Раздел</label><select id="editSection"></select></div>
      <div class="form-row"><label>Название</label><input id="editName" type="text"></div>
      <div class="form-row"><label>Картинка (URL)</label><input id="editImg" type="text"></div>
      <div class="split-row">
        <div class="form-row"><label>Никнейм (необязательно)</label><input id="editNickname" type="text"></div>
        <div class="form-row">
          <label>Ссылка</label>
          <div class="input-with-icon">
            <input id="editHref" type="text">
            <button class="icon-btn" id="editHrefUnlock" type="button" title="Разрешить редактирование ссылки">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelEdit" type="button">Отмена</button>
        <button id="saveEdit" type="button">Сохранить</button>
      </div>
      <div class="helper">Изменения сохраняются автоматически и сразу видны всем, кто открыл страницу.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
    import {
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyAjIY9iH0gZT9WalyKTUh6zNinBNvt9aqQ",
    authDomain: "ovni-b5823.firebaseapp.com",
    databaseURL: "https://ovni-b5823-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ovni-b5823",
    storageBucket: "ovni-b5823.firebasestorage.app",
    messagingSenderId: "916848124747",
    appId: "1:916848124747:web:7fa20edb5701619498fece",
    measurementId: "G-ZCKKVMYFVN"
    };

    const ADMIN_UID = "xOqvdkpV57U8BSfnjePCRJRiaOi2";
    const DOC_PATH = ["cards", "board"];

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const boardRef = doc(db, DOC_PATH[0], DOC_PATH[1]);

    const seedData = {
      "predmety-chr": { title: "Предметы ЧР", items: [], hidden: false, specialType: "" }
    };

    /* ── special category auto-fill rules (keyed by specialType id, NOT by title) ── */
    const SPECIAL_TYPES = {
      seeds:     { label: "Семена пропуска", name: "Семена пропуска", img: "https://www.lowadi.com/media/equideo/image//produits/60/graines-pass.png" },
      growth:    { label: "Очки роста",       name: "Очки роста",       img: "https://www.lowadi.com/media/equideo/image//produits/60/vieillissement.png" },
      checklist: { label: "Чек-лист",         name: "Рандом",           img: "" }
    };

    let data = {};
    let order = [];

    const state = {
      editing: false,
      isAdmin: false,
      history: [],
      future: [],
      collapsedInactive: {},
      pending: null,
      modalOpen: false,
      drag: null,
      hrefUnlocked: false
    };

    const main       = document.getElementById("main");
    const modeBtn    = document.getElementById("modeBtn");
    const undoBtn    = document.getElementById("undoBtn");
    const redoBtn    = document.getElementById("redoBtn");
    const loginBtn   = document.getElementById("loginBtn");
    const syncStatus = document.getElementById("syncStatus");
    const addSectionBtn = document.getElementById("addSectionBtn");

    const loginModal    = document.getElementById("loginModal");
    const loginEmail    = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginSubmit   = document.getElementById("loginSubmit");
    const loginCancel   = document.getElementById("loginCancel");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle    = document.getElementById("modalTitle");
    const editSection   = document.getElementById("editSection");
    const editName      = document.getElementById("editName");
    const editHref      = document.getElementById("editHref");
    const editHrefUnlock= document.getElementById("editHrefUnlock");
    const editImg       = document.getElementById("editImg");
    const editNickname  = document.getElementById("editNickname");
    const editEnabled   = document.getElementById("editEnabled");

    /* ── icon svg templates (shared style: thin stroke, muted -> accent on hover) ── */
    const ICON_EYE_OPEN = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>`;
    const ICON_EYE_CLOSED = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>`;
    const ICON_X = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>`;
    const ICON_DUPLICATE = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376A8.965 8.965 0 0 0 12 12.75c-.129 0-.256.003-.383.008l-.384-.384a4.501 4.501 0 0 0-6.364 0l-1.5 1.5a4.5 4.5 0 0 0 0 6.364l1.5 1.5a4.5 4.5 0 0 0 6.364 0l1.114-1.114m5.249-11.249v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V3.375c0-.621.504-1.125 1.125-1.125h9.75c.621 0 1.125.504 1.125 1.125v3.375Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 8.25h-3.375a1.125 1.125 0 0 0-1.125 1.125V12.75c0 .621.504 1.125 1.125 1.125h3.375A1.125 1.125 0 0 0 17.625 12.75V9.375c0-.621-.504-1.125-1.125-1.125Z"/></svg>`;

    /* ── helpers ── */
    function isInactive(item){ return item.inactive === true; }
    function isSpacer(item)  { return item.__type === "spacer"; }

    function getCardId(href){
      try { return new URL(href).searchParams.get("id") || ""; }
      catch { return ""; }
    }
    function getNickname(item){ return item.nickname || ""; }
    function getCardSubtitle(item){
      const nick = getNickname(item).trim();
      return nick ? nick : "#" + getCardId(item.href);
    }

    function applySpecialType(sectionId, item){
      const sec = data[sectionId];
      const type = sec && sec.specialType;
      if(type && SPECIAL_TYPES[type]){
        item.name = SPECIAL_TYPES[type].name;
        if(SPECIAL_TYPES[type].img) item.img = SPECIAL_TYPES[type].img;
        else item.img = "";
      }
      return item;
    }

    /* ── save ── */
    let saveTimer = null;
    async function saveToCloud(){
      syncStatus.textContent = "Сохранение...";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try {
          await setDoc(boardRef, { data, order, updatedAt: Date.now() });
          syncStatus.textContent = "Сохранено";
        } catch(e){
          console.error(e);
          syncStatus.textContent = "Ошибка сохранения";
        }
      }, 400);
    }

    let applyingRemote = false;
    onSnapshot(boardRef, snap => {
      if(!snap.exists()){
        setDoc(boardRef, { data: seedData, order: Object.keys(seedData) });
        return;
      }
      const remote = snap.data();
      applyingRemote = true;
      data  = remote.data  || {};
      order = remote.order || Object.keys(data);
      render();
      applyingRemote = false;
      syncStatus.textContent = "Синхронизировано";
    }, err => {
      console.error(err);
      syncStatus.textContent = "Нет соединения";
    });

    onAuthStateChanged(auth, user => {
      state.isAdmin = !!user && user.uid === ADMIN_UID;
      loginBtn.textContent = state.isAdmin ? "Выйти" : "Войти";
      loginBtn.classList.toggle("logged-in", state.isAdmin);
      modeBtn.style.display  = state.isAdmin ? "" : "none";
      undoBtn.style.display  = state.isAdmin ? "" : "none";
      redoBtn.style.display  = state.isAdmin ? "" : "none";
      if(user) console.log("UID:", user.uid);
      if(!state.isAdmin) setEditing(false);
    });

    loginBtn.addEventListener("click", () => {
      if(state.isAdmin) signOut(auth);
      else loginModal.style.display = "flex";
    });
    loginCancel.addEventListener("click", () => loginModal.style.display = "none");
    loginSubmit.addEventListener("click", async () => {
      try {
        await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
        loginModal.style.display = "none";
        loginEmail.value = ""; loginPassword.value = "";
      } catch(e){ alert("Ошибка входа: " + e.message); }
    });

    /* ═══════════════ RENDER ═══════════════ */
    function render(){
      main.innerHTML = "";

      order.forEach(id => {
        if(!data[id]) return;
        const sec = data[id];
        if(sec.hidden && !state.isAdmin) return;

        const section = document.createElement("section");
        section.id = id;
        if(sec.hidden) section.classList.add("section-hidden-user");

        const h2 = document.createElement("h2");

        const titleSpan = document.createElement("span");
        titleSpan.className = "section-title-text";
        titleSpan.contentEditable = state.editing ? "true" : "false";
        titleSpan.spellcheck = false;
        titleSpan.textContent = sec.title;
        if(state.editing){
          titleSpan.addEventListener("blur", () => {
            const newTitle = titleSpan.textContent.trim();
            if(newTitle && newTitle !== sec.title){
              pushHistory();
              data[id].title = newTitle;
              saveToCloud();
            }
          });
          titleSpan.addEventListener("keydown", e => {
            if(e.key === "Enter"){ e.preventDefault(); titleSpan.blur(); }
          });
        }

        const countEm = document.createElement("em");
        countEm.textContent = sec.items.filter(it => !isSpacer(it)).length;

        const sectionControls = document.createElement("div");
        sectionControls.className = "section-controls";

        if(state.editing){
          const eyeBtn = document.createElement("button");
          eyeBtn.className = "icon-btn" + (!sec.hidden ? " active-eye" : "");
          eyeBtn.type = "button";
          eyeBtn.title = sec.hidden ? "Показать категорию пользователям" : "Скрыть от пользователей";
          eyeBtn.innerHTML = sec.hidden ? ICON_EYE_CLOSED : ICON_EYE_OPEN;
          eyeBtn.addEventListener("click", () => {
            pushHistory();
            data[id].hidden = !data[id].hidden;
            commit();
          });

          const delBtn = document.createElement("button");
          delBtn.className = "icon-btn danger";
          delBtn.type = "button";
          delBtn.title = "Удалить категорию";
          delBtn.innerHTML = ICON_X;
          delBtn.addEventListener("click", () => {
            if(!confirm(`Удалить категорию "${sec.title}" со всеми карточками?`)) return;
            pushHistory();
            delete data[id];
            order.splice(order.indexOf(id), 1);
            commit();
          });

          const typeSelect = document.createElement("select");
          typeSelect.className = "section-type-select";
          typeSelect.title = "Спецтип категории (авто-название/картинка карточек)";
          const noneOpt = document.createElement("option");
          noneOpt.value = ""; noneOpt.textContent = "— обычная —";
          typeSelect.appendChild(noneOpt);
          Object.keys(SPECIAL_TYPES).forEach(key => {
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = SPECIAL_TYPES[key].label;
            typeSelect.appendChild(opt);
          });
          typeSelect.value = sec.specialType || "";
          typeSelect.addEventListener("change", () => {
            pushHistory();
            data[id].specialType = typeSelect.value;
            commit();
          });

          sectionControls.append(eyeBtn, delBtn, typeSelect);
        }

        h2.append(titleSpan, countEm, sectionControls);
        section.appendChild(h2);

        const activeGrid = document.createElement("div");
        activeGrid.className = "grid";
        activeGrid.dataset.section = id;
        activeGrid.dataset.zone = "active";

        const inactiveWrap = document.createElement("button");
        inactiveWrap.className = "subhead toggleable admin-only";
        inactiveWrap.type = "button";
        const inactiveTitleSpan = document.createElement("span");
        inactiveTitleSpan.className = "subtitle";
        inactiveTitleSpan.textContent = "Неактивные";
        const inactiveArrow = document.createElement("span");
        inactiveArrow.className = "arrow";
        inactiveArrow.textContent = "▼";
        inactiveWrap.append(inactiveTitleSpan, inactiveArrow);

        const inactiveGrid = document.createElement("div");
        inactiveGrid.className = "grid inactive";
        inactiveGrid.dataset.section = id;
        inactiveGrid.dataset.zone = "inactive";

        const collapsed = state.collapsedInactive[id] !== false;
        if(collapsed){
          inactiveWrap.classList.add("is-collapsed");
          inactiveGrid.classList.add("is-collapsed");
        }

        inactiveWrap.addEventListener("click", () => {
          const nowCollapsed = !inactiveWrap.classList.contains("is-collapsed");
          state.collapsedInactive[id] = nowCollapsed;
          inactiveWrap.classList.toggle("is-collapsed", nowCollapsed);
          inactiveGrid.classList.toggle("is-collapsed", nowCollapsed);
        });

        sec.items.forEach((item, index) => {
          if(isSpacer(item)){
            if(!isInactive(item)) activeGrid.appendChild(createSpacerEl(id, index));
            return;
          }
          const card = createCard(id, index, item, isInactive(item));
          if(isInactive(item)) inactiveGrid.appendChild(card);
          else activeGrid.appendChild(card);
        });

        if(state.editing){
          activeGrid.appendChild(createAddCard(id));
          const addSpacerBtn = document.createElement("button");
          addSpacerBtn.type = "button";
          addSpacerBtn.className = "add-card single add-spacer-btn";
          addSpacerBtn.title = "Добавить пустой отступ";
          addSpacerBtn.innerHTML = ICON_DUPLICATE.replace("<svg ", '<svg style="width:20px;height:20px;" ');
          addSpacerBtn.addEventListener("click", () => {
            pushHistory();
            const insertIdx = sec.items.filter(it => !isInactive(it)).length;
            let realIdx = sec.items.length, count = 0;
            for(let i = 0; i < sec.items.length; i++){
              if(!isInactive(sec.items[i])) count++;
              if(count === insertIdx){ realIdx = i + 1; break; }
            }
            data[id].items.splice(realIdx, 0, { __type: "spacer" });
            commit();
          });
          activeGrid.appendChild(addSpacerBtn);
        }

        bindGridDropZone(activeGrid);
        bindGridDropZone(inactiveGrid);

        section.appendChild(activeGrid);
        section.appendChild(inactiveWrap);
        section.appendChild(inactiveGrid);
        main.appendChild(section);
      });

      populateSectionSelect();
    }

    function createSpacerEl(sectionId, index){
      const wrap = document.createElement("div");
      wrap.className = "spacer-block";
      wrap.dataset.section = sectionId;
      wrap.dataset.index = index;

      const inner = document.createElement("div");
      inner.className = "spacer-block-inner";
      wrap.appendChild(inner);

      if(state.editing){
        const controls = document.createElement("div");
        controls.className = "spacer-controls";

        const dupBtn = document.createElement("button");
        dupBtn.className = "icon-btn";
        dupBtn.type = "button";
        dupBtn.title = "Дублировать отступ";
        dupBtn.innerHTML = ICON_DUPLICATE;
        dupBtn.addEventListener("click", e => {
          e.stopPropagation();
          pushHistory();
          data[sectionId].items.splice(index, 0, { __type: "spacer" });
          commit();
        });

        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn danger";
        delBtn.type = "button";
        delBtn.title = "Удалить отступ";
        delBtn.innerHTML = ICON_X;
        delBtn.addEventListener("click", e => {
          e.stopPropagation();
          pushHistory();
          data[sectionId].items.splice(index, 1);
          commit();
        });

        controls.append(dupBtn, delBtn);
        wrap.appendChild(controls);

        wrap.draggable = true;
        wrap.addEventListener("dragstart", e => {
          state.drag = { section: sectionId, index, zone: "active", isSpacer: true };
          wrap.style.opacity = "0.4";
          e.dataTransfer.effectAllowed = "move";
        });
        wrap.addEventListener("dragend", () => { wrap.style.opacity = ""; state.drag = null; });
      }

      return wrap;
    }

    function createCard(sectionId, index, item, inactive){
      const card = document.createElement("a");
      card.className = "card" + (state.editing ? " editing" : "") + (inactive ? " inactive-card" : "");
      card.href = item.href;
      card.target = "_blank";
      card.rel = "noopener";
      card.draggable = state.editing;
      card.dataset.section = sectionId;
      card.dataset.index   = index;

      card.innerHTML = `
        <button class="delete-x icon-btn danger" type="button" title="Удалить" aria-label="Удалить карточку">${ICON_X}</button>
        ${item.img ? `<img src="${item.img}" alt="" onerror="this.style.visibility='hidden'">` : `<span class="noicon">↗</span>`}
        <span class="name"></span>
        <small></small>
      `;
      card.querySelector(".name").textContent = item.name;
      card.querySelector("small").textContent = getCardSubtitle(item);

      if(state.editing){
        card.addEventListener("click", event => {
          event.preventDefault();
          openEditor(sectionId, index, item);
        });
        card.querySelector(".delete-x").addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          deleteItem(sectionId, index);
        });

        card.addEventListener("dragstart", e => {
          state.drag = { section: sectionId, index, zone: inactive ? "inactive" : "active" };
          card.classList.add("drag-source");
          e.dataTransfer.effectAllowed = "move";
        });
        card.addEventListener("dragend", () => {
          card.classList.remove("drag-source");
          card.classList.remove("drag-over-before");
          card.classList.remove("drag-over-after");
        });

        card.addEventListener("dragover", e => {
          if(!state.drag) return;
          e.preventDefault();
          e.stopPropagation();
          const rect = card.getBoundingClientRect();
          const half = rect.left + rect.width / 2;
          card.classList.toggle("drag-over-before", e.clientX < half);
          card.classList.toggle("drag-over-after",  e.clientX >= half);
        });
        card.addEventListener("dragleave", () => {
          card.classList.remove("drag-over-before");
          card.classList.remove("drag-over-after");
        });
        card.addEventListener("drop", e => {
          if(!state.drag) return;
          e.preventDefault();
          e.stopPropagation();
          const rect = card.getBoundingClientRect();
          const half = rect.left + rect.width / 2;
          const before = e.clientX < half;
          card.classList.remove("drag-over-before");
          card.classList.remove("drag-over-after");

          moveItemPrecise(state.drag.section, state.drag.index, sectionId, index, before, inactive);
          state.drag = null;
        });
      }

      return card;
    }

    function createAddCard(sectionId){
      const button = document.createElement("button");
      button.type = "button";
      button.className = "add-card single";
      button.innerHTML = `<span class="plus">+</span>`;
      button.addEventListener("click", () => openEditor(sectionId, -1, null));
      return button;
    }

    function bindGridDropZone(grid){
      grid.addEventListener("dragover", event => {
        if(!state.editing || !state.drag) return;
        event.preventDefault();
        grid.classList.add("dragover");
      });
      grid.addEventListener("dragleave", e => {
        if(!grid.contains(e.relatedTarget)) grid.classList.remove("dragover");
      });
      grid.addEventListener("drop", event => {
        if(!state.editing || !state.drag) return;
        if(event.target !== grid) return;
        event.preventDefault();
        grid.classList.remove("dragover");
        const toSection  = grid.dataset.section;
        const toInactive = grid.dataset.zone === "inactive";
        moveItemAppend(state.drag.section, state.drag.index, toSection, toInactive);
        state.drag = null;
      });
    }

    function moveItemPrecise(fromSection, fromIndex, toSection, toIndex, before, makeInactive){
      if(fromSection === toSection && fromIndex === toIndex) return;
      pushHistory();
      const item = data[fromSection].items.splice(fromIndex, 1)[0];
      if(makeInactive) item.inactive = true;
      else delete item.inactive;
      if(fromSection !== toSection) applySpecialType(toSection, item);

      let adjustedTo = toIndex;
      if(fromSection === toSection && fromIndex < toIndex) adjustedTo--;

      const insertAt = before ? adjustedTo : adjustedTo + 1;
      data[toSection].items.splice(Math.max(0, insertAt), 0, item);
      commit();
    }

    function moveItemAppend(fromSection, fromIndex, toSection, makeInactive){
      pushHistory();
      const item = data[fromSection].items.splice(fromIndex, 1)[0];
      if(makeInactive) item.inactive = true;
      else delete item.inactive;
      if(fromSection !== toSection) applySpecialType(toSection, item);
      data[toSection].items.push(item);
      commit();
    }

    function deleteItem(sectionId, index){
      if(!confirm("Удалить карточку?")) return;
      pushHistory();
      data[sectionId].items.splice(index, 1);
      commit();
    }

    function pushHistory(){
      state.history.push(JSON.stringify({ data, order }));
      if(state.history.length > 50) state.history.shift();
      state.future = [];
    }
    function restoreFrom(snapshot){
      const r = JSON.parse(snapshot);
      data  = r.data;
      order = r.order;
      commit();
    }
    undoBtn.addEventListener("click", () => {
      if(!state.history.length) return;
      state.future.push(JSON.stringify({ data, order }));
      restoreFrom(state.history.pop());
    });
    redoBtn.addEventListener("click", () => {
      if(!state.future.length) return;
      state.history.push(JSON.stringify({ data, order }));
      restoreFrom(state.future.pop());
    });

    function commit(){ render(); saveToCloud(); }

    function setEditing(enabled){
      state.editing = enabled && state.isAdmin;
      document.body.classList.toggle("editing-mode", state.editing);
      modeBtn.classList.toggle("save-mode", state.editing);
      modeBtn.textContent = state.editing ? "Готово" : "Редактировать";
      render();
    }
    modeBtn.addEventListener("click", () => setEditing(!state.editing));

    addSectionBtn.addEventListener("click", () => {
      const title = prompt("Название новой категории:");
      if(!title || !title.trim()) return;
      const id = "sec-" + Date.now();
      pushHistory();
      data[id] = { title: title.trim(), items: [], hidden: false, specialType: "" };
      order.push(id);
      commit();
    });

    function populateSectionSelect(){
      editSection.innerHTML = "";
      order.forEach(id => {
        if(!data[id]) return;
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = data[id].title;
        editSection.appendChild(opt);
      });
    }

    function openEditor(sectionId, index, item){
      state.pending = { section: sectionId, index };
      state.modalOpen = true;
      state.hrefUnlocked = index < 0;
      modalTitle.textContent = index >= 0 ? "Редактировать карточку" : "Новая карточка";
      editSection.value    = sectionId;
      editName.value       = item ? item.name     : "";
      editHref.value       = item ? item.href     : "";
      editImg.value        = item ? (item.img||"") : "";
      editNickname.value   = item ? getNickname(item) : "";
      editEnabled.checked  = item ? !isInactive(item) : true;

      editHref.disabled = !state.hrefUnlocked;
      editHrefUnlock.style.display = state.hrefUnlocked ? "none" : "flex";

      modalBackdrop.style.display = "flex";
    }

    editHrefUnlock.addEventListener("click", () => {
      state.hrefUnlocked = true;
      editHref.disabled = false;
      editHrefUnlock.style.display = "none";
      editHref.focus();
    });

    function closeModal(){
      state.modalOpen = false;
      modalBackdrop.style.display = "none";
      state.pending = null;
    }

    document.getElementById("saveEdit").addEventListener("click", () => {
      const { section, index } = state.pending;
      const newSection = editSection.value;
      const name       = editName.value.trim();
      const href       = editHref.value.trim();
      const img        = editImg.value.trim();
      const nickname   = editNickname.value.trim();
      const enabled    = editEnabled.checked;

      if(!name || !href){ alert("Заполните название и ссылку."); return; }

      pushHistory();

      let item = { name, href, img };
      if(nickname) item.nickname = nickname;
      if(!enabled) item.inactive = true;

      if(index >= 0){
        if(newSection === section){
          data[section].items[index] = item;
        } else {
          data[section].items.splice(index, 1);
          item = applySpecialType(newSection, item);
          data[newSection].items.push(item);
        }
      } else {
        item = applySpecialType(newSection, item);
        data[newSection].items.push(item);
      }

      closeModal();
      commit();
    });

    document.getElementById("cancelEdit").addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", e => { if(e.target === modalBackdrop) closeModal(); });
    document.addEventListener("keydown", e => {
      if(!state.modalOpen) return;
      if(e.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
